<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画プレイヤー</title>
    <style>
        /* 画面全体のデザイン調整 */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* 落ち着いた暗めの背景 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* プレイヤーのコンテナ */
        .video-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        /* 動画自体のスタイル */
        video {
            width: 100%;
            display: block;
        }

        /* --- 右上に配置するQRコード（a.jpg）のスタイル --- */
        .qr-fixed-container {
            position: fixed;    /* 画面に対して固定 */
            top: 20px;          /* 上端からの距離 */
            right: 20px;        /* 右端からの距離 */
            z-index: 1000;      /* 動画より手前に表示させる */
            
            width: 120px;       /* QRコードの大きさ */
            height: 120px;
            
            background-color: #ffffff; /* 白い背景と枠 */
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .qr-fixed-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

<!-- 右上に固定表示されるQRコード -->
<div class="qr-fixed-container">
    <img src="a.jpg" alt="QRコード">
</div>

<div class="video-container">
    <!-- 
      controls: 再生バーや音量などのコントローラーを表示
      autoplay: 自動再生
      loop: ループ再生
    -->
    <video src="hoterunyuawaji mv.mp4" controls autoplay loop>
        お使いのブラウザは動画タグをサポートしていません。
    </video>
</div>

</body>
</html>
